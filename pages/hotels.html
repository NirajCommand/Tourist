<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotels - Wanderlust</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    
    <!-- Critical SDKs in Head -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/role.js"></script>
    <script src="../services/supabase.js"></script>
    <script src="../components/navbar.js"></script>

    <style>
        .hotel-hero {
            background-image: var(--gradient-hero), url('https://images.unsplash.com/photo-1542314831-c6a4d27ce66b?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center; padding: 100px 0 60px 0; margin-top: 50px;
        }
    </style>
</head>
<body data-required-role="Tourist">
    <div id="navbar-container"></div>
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1060;"></div>

    <section class="hotel-hero text-center text-white fade-in">
        <div class="container">
            <h1 class="display-4 poppins-bold mb-3">Find Premium Stays</h1>
            <p class="lead inter-regular mx-auto" style="max-width: 600px;">Discover the finest hotels and resorts for your next perfect getaway.</p>
            
            <div class="glassmorphism bg-white p-3 mt-5 mx-auto rounded-pill" style="max-width: 800px;">
                <form class="row g-2 align-items-center" id="hotelSearchForm">
                    <div class="col-md-9">
                        <div class="input-group ps-3">
                            <span class="input-group-text bg-transparent border-0"><i class="bi bi-geo-alt text-teal fs-5"></i></span>
                            <input type="text" id="hotelSearchInput" class="form-control border-0 shadow-none ps-0" placeholder="Destination or Hotel Name">
                        </div>
                    </div>
                    <div class="col-md-3 d-grid">
                        <button type="submit" class="btn btn-brand rounded-pill">Search Hotels</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <section class="container mt-5 fade-in">
        <h3 class="poppins-bold mb-4">Recommended Hotels</h3>
        <div class="row g-4" id="hotelsGrid">
            <div class="col-12 text-center py-5" id="hotelsLoading">
                <div class="spinner-border text-teal" role="status"></div>
            </div>
        </div>
    </section>

    <!-- Page Logic Scripts (SDKs in head) -->
    <script src="../js/ui.js"></script>
    <script src="../js/role.js"></script>
    <script src="../services/supabase.js"></script>
    <script src="../components/navbar.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const hGrid = document.getElementById('hotelsGrid');
            const hLoading = document.getElementById('hotelsLoading');
            const hForm = document.getElementById('hotelSearchForm');
            let allHotels = [];

            const renderHotels = (hotels) => {
                hGrid.innerHTML = '';
                if(hotels.length === 0) {
                    hGrid.innerHTML = '<p class="text-center py-5 text-muted">No hotels found matching your search.</p>';
                    return;
                }
                hotels.forEach(hotel => {
                    const col = document.createElement('div');
                    col.className = 'col-md-6 col-lg-4';
                    col.innerHTML = `
                        <div class="card border-0 shadow-sm rounded-4 h-100 card-hover overflow-hidden">
                            <div class="position-relative">
                                <img src="${hotel.ImageURL}" class="card-img-top" style="height: 250px; object-fit: cover;">
                                <div class="position-absolute top-0 end-0 m-3 glassmorphism-dark px-2 py-1 rounded fs-6">
                                    <i class="bi bi-star-fill text-warning me-1"></i>${hotel.Rating}
                                </div>
                            </div>
                            <div class="card-body p-4 d-flex flex-column">
                                <h5 class="card-title poppins-semibold">${hotel.HotelName}</h5>
                                <p class="text-muted small mb-3"><i class="bi bi-geo-alt me-1"></i>Destination ID: ${hotel.DestinationID}</p>
                                <div class="mt-auto pt-3 border-top d-flex justify-content-between align-items-center">
                                    <span class="text-teal small"><i class="bi bi-cup-hot me-1"></i>Breakfast Incl.</span>
                                    <a href="hotel-details.html?id=${hotel.HotelID}" class="btn btn-outline-brand rounded-pill px-4">View Rooms</a>
                                </div>
                            </div>
                        </div>
                    `;
                    hGrid.appendChild(col);
                });
            };

            hForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const q = document.getElementById('hotelSearchInput').value.toLowerCase();
                const filtered = allHotels.filter(h => h.HotelName.toLowerCase().includes(q) || h.DestinationID.toString().includes(q));
                renderHotels(filtered);
            });

            try {
                allHotels = await window.supabaseAPI.getHotels();
                hLoading.classList.add('d-none');
                renderHotels(allHotels);
            } catch(e) {}
        });
    </script>
</body>
</html>

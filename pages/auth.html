<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wanderlust</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            background-image: linear-gradient(rgba(30, 60, 114, 0.4), rgba(0, 180, 219, 0.4)), url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div class="glassmorphism p-5 shadow-lg mx-auto" style="max-width: 450px; width: 90%;">
        <div class="text-center mb-5">
            <h1 class="poppins-bold text-teal mb-2"><i class="bi bi-compass me-2"></i>Wanderlust</h1>
            <p id="authTitle" class="text-muted inter-medium">Welcome back! Please login to continue.</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="mb-4">
                <label class="form-label inter-medium small text-muted">Email Address</label>
                <input type="email" id="email" class="form-control form-control-lg border-0 bg-light rounded-4" placeholder="tourist@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label inter-medium small text-muted">Password</label>
                <input type="password" id="password" class="form-control form-control-lg border-0 bg-light rounded-4" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-brand w-100 btn-lg rounded-pill shadow-sm py-3 mt-2">Sign In</button>
        </form>

        <!-- Signup Form (Hidden) -->
        <form id="signupForm" class="d-none">
            <div class="mb-3">
                <label class="form-label inter-medium small text-muted">Email Address</label>
                <input type="email" id="sEmail" class="form-control form-control-lg border-0 bg-light rounded-4" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label inter-medium small text-muted">Password</label>
                <input type="password" id="sPassword" class="form-control form-control-lg border-0 bg-light rounded-4" placeholder="••••••••" required>
            </div>
            <div class="mb-4">
                <label class="form-label inter-medium small text-muted">Join As</label>
                <select id="sRole" class="form-select form-select-lg border-0 bg-light rounded-4">
                    <option value="Tourist">Tourist</option>
                    <option value="Hotel">Hotel Provider</option>
                    <option value="Guide">Tour Guide</option>
                </select>
            </div>
            <button type="submit" class="btn btn-brand w-100 btn-lg rounded-pill shadow-sm py-3 mt-2">Create Account</button>
        </form>

        <div class="text-center mt-4">
            <p id="toggleText" class="text-muted small">Don't have an account? <a href="#" id="toggleAuth" class="text-teal fw-bold">Sign up</a></p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <script src="../services/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../components/toast.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const authTitle = document.getElementById('authTitle');
        const toggleAuth = document.getElementById('toggleAuth');
        const toggleText = document.getElementById('toggleText');

        let isLogin = true;

        toggleAuth.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            if (isLogin) {
                loginForm.classList.remove('d-none');
                signupForm.classList.add('d-none');
                authTitle.textContent = 'Welcome back! Please login to continue.';
                toggleText.innerHTML = "Don't have an account? <a href='#' id='toggleAuth' class='text-teal fw-bold'>Sign up</a>";
            } else {
                loginForm.classList.add('d-none');
                signupForm.classList.remove('d-none');
                authTitle.textContent = 'Join Wanderlust to start your journey.';
                toggleText.innerHTML = "Already have an account? <a href='#' id='toggleAuth' class='text-teal fw-bold'>Sign in</a>";
            }
            // Bind the new toggle link
            document.getElementById('toggleAuth').addEventListener('click', (ev) => {
                ev.preventDefault();
                toggleAuth.click();
            });
        });

        const redirectUser = (role) => {
            const paths = {
                Tourist: 'user-home.html',
                Hotel: 'hotel-dashboard.html',
                Guide: 'guide-dashboard.html',
                Admin: 'admin-dashboard.html'
            };
            window.location.href = paths[role] || 'user-home.html';
        };

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await window.authAPI.login(email, password);
            if (res.success) {
                redirectUser(res.user.role);
            } else {
                window.showToast('Login Failed', res.error, 'danger');
            }
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('sEmail').value;
            const password = document.getElementById('sPassword').value;
            const role = document.getElementById('sRole').value;
            const res = await window.authAPI.signup(email, password, role);
            if (res.success) {
                window.showToast('Success!', 'Account created successfully. Redirecting...', 'success');
                setTimeout(() => redirectUser(res.user.role), 1500);
            } else {
                window.showToast('Signup Failed', res.error, 'danger');
            }
        });
    </script>
</body>
</html>

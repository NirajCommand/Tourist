<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Wanderlust</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    
    <!-- Critical SDKs in Head -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background-image: linear-gradient(rgba(30, 60, 114, 0.4), rgba(0, 180, 219, 0.4)), url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <div class="glassmorphism p-5 shadow-lg mx-auto" style="max-width: 450px; width: 90%;">
        <div class="text-center mb-5">
            <h1 class="poppins-bold text-teal mb-2"><i class="bi bi-compass me-2"></i>Wanderlust</h1>
            <p class="text-muted inter-medium">Join Wanderlust to start your journey.</p>
        </div>

        <form id="signupForm">
            <div class="mb-3">
                <label class="form-label inter-medium small text-muted">Email Address</label>
                <input type="email" id="email" class="form-control form-control-lg border-0 bg-light rounded-4" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label inter-medium small text-muted">Password</label>
                <input type="password" id="password" class="form-control form-control-lg border-0 bg-light rounded-4" placeholder="••••••••" required>
            </div>
            <div class="mb-4">
                <label class="form-label inter-medium small text-muted">Join As</label>
                <select id="role" class="form-select form-select-lg border-0 bg-light rounded-4">
                    <option value="Tourist">Tourist</option>
                    <option value="Hotel">Hotel Provider</option>
                    <option value="Guide">Tour Guide</option>
                </select>
            </div>
            <button type="submit" class="btn btn-brand w-100 btn-lg rounded-pill shadow-sm py-3 mt-2">Create Account</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small">Already have an account? <a href="auth.html" class="text-teal fw-bold">Sign in</a></p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

    <!-- Page Logic Scripts (SDKs are in head) -->
    <script src="../services/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../components/toast.js"></script>
    
    <script>
        console.log('Signup Page Loaded');
        const signupForm = document.getElementById('signupForm');

        const redirectUser = (role) => {
            console.log('Redirecting to dashboard for role:', role);
            const paths = {
                Tourist: 'user-home.html',
                Hotel: 'hotel-dashboard.html',
                Guide: 'guide-dashboard.html',
                Admin: 'admin-dashboard.html'
            };
            window.location.href = paths[role] || 'user-home.html';
        };

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            console.log('Attempting signup...');
            const res = await window.authAPI.signup(email, password, role);
            if (res.success) {
                console.log('Signup successful');
                window.showToast('Success!', 'Account created successfully. Redirecting...', 'success');
                setTimeout(() => redirectUser(role), 1500);
            } else {
                console.error('Signup failed:', res.error);
                window.showToast('Signup Failed', res.error, 'danger');
            }
        });
    </script>
</body>
</html>

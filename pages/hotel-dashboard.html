<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Dashboard - Wanderlust</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-required-role="Hotel">
    <div id="navbar-container"></div>
    <div style="height: 100px;"></div>

    <section class="container mt-4 mb-5 fade-in">
        <h2 class="poppins-bold mb-4">Hotel Management Dashboard</h2>
        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="glassmorphism p-4 text-center border-0">
                    <i class="bi bi-calendar-check fs-2 text-teal mb-2"></i>
                    <h2 class="poppins-bold mb-0">12</h2>
                    <p class="text-muted small mb-0">Bookings (MTD)</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="glassmorphism p-4 text-center border-0">
                    <i class="bi bi-door-open fs-2 text-teal mb-2"></i>
                    <h2 class="poppins-bold mb-0">45</h2>
                    <p class="text-muted small mb-0">Rms Available</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="glassmorphism p-4 text-center border-0">
                    <i class="bi bi-currency-rupee fs-2 text-teal mb-2"></i>
                    <h2 class="poppins-bold mb-0">125k</h2>
                    <p class="text-muted small mb-0">Total Earnings (₹)</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="glassmorphism p-4 text-center border-0">
                    <i class="bi bi-star fs-2 text-teal mb-2"></i>
                    <h2 class="poppins-bold mb-0">4.8</h2>
                    <p class="text-muted small mb-0">Avg Rating</p>
                </div>
            </div>
        </div>

        <div class="glassmorphism p-4 mt-5">
            <h5 class="poppins-semibold mb-4">Recent Bookings</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="bg-light">
                        <tr>
                            <th>Guest Name</th>
                            <th>Room Type</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="inter-medium">John Doe</td>
                            <td>Deluxe Suite</td>
                            <td>2024-05-15</td>
                            <td><span class="badge bg-success rounded-pill px-3">Confirmed</span></td>
                            <td class="poppins-bold">₹15,000</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/role.js"></script>
    <script src="../services/supabase.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>

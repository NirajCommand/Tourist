<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Wanderlust</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body data-required-role="Tourist">
    <div id="navbar-container"></div>
    <div style="height: 100px;"></div>

    <section class="container mt-4 mb-5 fade-in">
        <h2 class="poppins-bold mb-4">My Profile</h2>
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glassmorphism p-4 text-center">
                    <div class="bg-teal text-white rounded-circle d-flex justify-content-center align-items-center mx-auto mb-3" style="width: 100px; height: 100px; font-size: 2.5rem;" id="pAvatar">U</div>
                    <h4 class="poppins-bold mb-1" id="pName">User</h4>
                    <p class="text-muted small inter-regular mb-4" id="pEmail">user@example.com</p>
                    <button class="btn btn-outline-brand rounded-pill btn-sm w-100">Edit Profile</button>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="glassmorphism p-4 h-100">
                    <h5 class="poppins-semibold mb-4">Account Settings</h5>
                    <form>
                        <div class="mb-3"><label class="form-label small">Phone Number</label><input type="text" class="form-control bg-light border-0" placeholder="+91 00000 00000"></div>
                        <div class="mb-3"><label class="form-label small">Preferred Language</label><select class="form-select bg-light border-0"><option>English</option><option>Hindi</option></select></div>
                        <button type="submit" class="btn btn-brand rounded-pill px-5 mt-3 shadow-sm">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/role.js"></script>
    <script src="../services/supabase.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('pAvatar').textContent = user.email[0].toUpperCase();
                document.getElementById('pName').textContent = user.email.split('@')[0];
                document.getElementById('pEmail').textContent = user.email;
            }
        });
    </script>
</body>
</html>

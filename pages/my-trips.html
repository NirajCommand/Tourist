<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trips - Wanderlust</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    
    <!-- Critical SDKs in Head -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body data-required-role="Tourist">
    <div id="navbar-container"></div>
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1060;"></div>

    <div style="height: 100px;"></div>

    <section class="container mt-4 mb-5 fade-in">
        <h2 class="poppins-bold mb-4">My Trips</h2>
        <div id="tripsContainer" class="row g-4">
            <div class="col-12 text-center py-5"><div class="spinner-border text-teal"></div></div>
        </div>
    </section>

    <!-- Review Modal -->
    <div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glassmorphism border-0 shadow-lg p-3">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title poppins-bold">Leave a Review</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body py-4">
                    <div class="mb-3 text-center fs-3" id="ratingStars">
                        <i class="bi bi-star text-muted cursor-pointer" data-value="1"></i>
                        <i class="bi bi-star text-muted cursor-pointer" data-value="2"></i>
                        <i class="bi bi-star text-muted cursor-pointer" data-value="3"></i>
                        <i class="bi bi-star text-muted cursor-pointer" data-value="4"></i>
                        <i class="bi bi-star text-muted cursor-pointer" data-value="5"></i>
                    </div>
                    <textarea id="reviewText" class="form-control bg-light border-0 rounded-4 p-3" rows="3" placeholder="Share your experience..."></textarea>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="submitReviewBtn" class="btn btn-brand rounded-pill px-4 shadow-sm">Submit Review</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Page Logic Scripts (SDKs in head) -->
    <script src="../js/ui.js"></script>
    <script src="../js/role.js"></script>
    <script src="../services/supabase.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/modal.js"></script>
    <script src="../components/toast.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('tripsContainer');
            let selectedRating = 0;
            let currentBookingId = null;

            async function loadTrips() {
                try {
                    const bookings = await window.supabaseAPI.getBookings(1);
                    container.innerHTML = '';
                    if (!bookings.length) {
                        container.innerHTML = '<div class="text-center py-5 text-muted">No bookings found. <a href="user-home.html">Start exploring!</a></div>';
                        return;
                    }

                    bookings.forEach(b => {
                        const col = document.createElement('div');
                        col.className = 'col-lg-6';
                        col.innerHTML = `
                            <div class="card border-0 shadow-sm rounded-4 overflow-hidden card-hover glassmorphism p-3">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <span class="badge bg-teal rounded-pill px-3 py-1">${b.Status}</span>
                                    <span class="text-muted small">${b.date}</span>
                                </div>
                                <h5 class="poppins-semibold mb-2">Booking #${b.BookingID}</h5>
                                <div class="d-flex justify-content-between align-items-end mt-3 border-top pt-3">
                                    <span class="fs-5 poppins-bold text-teal">₹${b.total_price.toFixed(2)}</span>
                                    <div>
                                        <button class="btn btn-outline-brand btn-sm rounded-pill px-3" onclick="triggerReview(${b.BookingID})">Review</button>
                                        <button class="btn btn-light btn-sm rounded-pill px-3 ms-2 text-danger" onclick="triggerCancel(${b.BookingID})">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.appendChild(col);
                    });
                } catch(e) {}
            }

            window.triggerReview = (id) => {
                currentBookingId = id;
                const modal = new bootstrap.Modal(document.getElementById('reviewModal'));
                modal.show();
            };

            const stars = document.querySelectorAll('#ratingStars i');
            stars.forEach(s => {
                s.addEventListener('click', () => {
                    selectedRating = parseInt(s.dataset.value);
                    stars.forEach((star, i) => {
                        if (i < selectedRating) star.classList.replace('bi-star', 'bi-star-fill'), star.classList.replace('text-muted', 'text-warning');
                        else star.classList.replace('bi-star-fill', 'bi-star'), star.classList.replace('text-warning', 'text-muted');
                    });
                });
            });

            document.getElementById('submitReviewBtn').addEventListener('click', async () => {
                const comment = document.getElementById('reviewText').value;
                if (!selectedRating) {
                    window.showToast('Select Rating', 'Please select a star rating first.', 'danger'); return;
                }
                const res = await window.supabaseAPI.createReview({ booking_id: currentBookingId, rating: selectedRating, comment });
                if (res.success) {
                    window.showToast('Thank you!', 'Your review has been successfully posted.', 'success');
                    bootstrap.Modal.getInstance(document.getElementById('reviewModal')).hide();
                }
            });

            loadTrips();
        });
    </script>
</body>
</html>

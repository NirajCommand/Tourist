<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Wanderlust</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .hero-section {
            background-image: var(--gradient-hero), url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 80vh;
            display: flex;
            align-items: center;
            padding-top: 80px;
        }
        .search-card { margin-top: -60px; z-index: 10; position: relative; }
        .offer-banner {
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            border-radius: 1.5rem;
            color: #d63384;
        }
    </style>
</head>
<body data-required-role="Tourist">
    <div id="navbar-container"></div>
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1060;"></div>

    <section class="hero-section">
        <div class="container text-center fade-in">
            <h1 class="display-3 text-white poppins-bold mb-4">Explore the World with Wanderlust</h1>
            <p class="lead text-light inter-regular mb-5">Curated travel experiences, top-rated hotels, and local guides for your next adventure.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="packages.html" class="btn btn-brand btn-lg shadow rounded-pill px-5">Explore Packages</a>
            </div>
        </div>
    </section>

    <!-- Search Section -->
    <section class="container search-card slide-up">
        <div class="glassmorphism p-4 p-md-5">
            <form class="row g-3 align-items-end" id="searchForm">
                <div class="col-md-4">
                    <label class="form-label inter-medium text-muted mb-2"><i class="bi bi-geo-alt me-2 text-teal"></i>Destination</label>
                    <input type="text" id="destInput" class="form-control form-control-lg border-0 bg-light rounded-4 ps-3" placeholder="Where to go?">
                </div>
                <div class="col-md-3">
                    <label class="form-label inter-medium text-muted mb-2"><i class="bi bi-calendar3 me-2 text-teal"></i>Date</label>
                    <input type="date" id="dateInput" class="form-control form-control-lg border-0 bg-light rounded-4">
                </div>
                <div class="col-md-3">
                    <label class="form-label inter-medium text-muted mb-2"><i class="bi bi-person me-2 text-teal"></i>Guests</label>
                    <input type="number" id="guestInput" class="form-control form-control-lg border-0 bg-light rounded-4" min="1" value="1">
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-brand btn-lg rounded-4 shadow-sm">Search</button>
                </div>
            </form>
        </div>
    </section>

    <!-- Summer Offer Banner -->
    <section class="container mt-5 pt-3">
        <div class="offer-banner p-4 p-md-5 shadow-sm d-flex align-items-center justify-content-between flex-wrap gap-4">
            <div>
                <h3 class="poppins-bold mb-2"><i class="bi bi-stars me-2"></i>Summer Special Offer</h3>
                <p class="mb-0 inter-medium fs-5 opacity-90">Enjoy 20% off on all Bali packages booked this month!</p>
            </div>
            <a href="packages.html?dest=Bali" class="btn btn-light rounded-pill px-5 py-3 text-danger poppins-bold fs-5 shadow-sm">Claim Now</a>
        </div>
    </section>

    <section class="container mt-5 pt-5 pb-5">
        <h2 class="poppins-bold mb-4">Trending Packages</h2>
        <div class="row g-4" id="packagesGrid">
            <div class="col-12 text-center py-5" id="packagesLoading">
                <div class="spinner-border text-teal"></div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/role.js"></script>
    <script src="../services/supabase.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/rating.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const pkgGrid = document.getElementById('packagesGrid');
            const pkgLoading = document.getElementById('packagesLoading');
            const searchForm = document.getElementById('searchForm');

            searchForm?.addEventListener('submit', (e) => {
                e.preventDefault();
                const d = document.getElementById('destInput').value;
                const dt = document.getElementById('dateInput').value;
                const gs = document.getElementById('guestInput').value;
                window.location.href = `packages.html?dest=${encodeURIComponent(d)}&date=${dt}&guests=${gs}`;
            });

            try {
                const packages = await window.supabaseAPI.getPackages();
                pkgLoading.classList.add('d-none');
                packages.forEach(p => {
                    const col = document.createElement('div');
                    col.className = 'col-md-6 col-lg-4';
                    col.innerHTML = `
                        <div class="card border-0 shadow-sm rounded-4 h-100 card-hover overflow-hidden">
                            <div class="position-relative">
                                <img src="${p.ImageURL}" class="card-img-top" style="height: 200px; object-fit: cover;">
                                <div class="position-absolute top-0 end-0 m-3 glassmorphism-dark px-2 py-1 rounded small">
                                    <i class="bi bi-star-fill text-warning me-1"></i>${p.Rating}
                                </div>
                            </div>
                            <div class="card-body p-4 d-flex flex-column">
                                <h5 class="poppins-semibold mb-2">${p.PackageName}</h5>
                                <p class="text-muted small inter-regular flex-grow-1">${p.Description}</p>
                                <div class="mt-3 pt-3 border-top d-flex justify-content-between align-items-center">
                                    <div class="text-teal">
                                        <span class="d-block small text-muted">Per person</span>
                                        <span class="fs-4 poppins-bold">₹${p.Price}</span>
                                    </div>
                                    <a href="package-details.html?id=${p.PackageID}" class="btn btn-outline-brand btn-sm rounded-pill px-4">Details</a>
                                </div>
                            </div>
                        </div>
                    `;
                    pkgGrid.appendChild(col);
                });
            } catch(e) {}
        });
    </script>
</body>
</html>
